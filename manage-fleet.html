<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Fleet — Cash4Crash Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #111210;
      --bg2:      #181917;
      --bg3:      #1e1f1d;
      --surface:  #242523;
      --border:   rgba(255,255,255,0.07);
      --text:     #f0ede8;
      --muted:    #8a8880;
      --accent:   #c8a96e;
      --radius:   12px;
      --nav-h:    72px;
    }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; min-height: 100vh; }
    
    /* NAV */
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; background: rgba(17,18,16,0.82); backdrop-filter: blur(18px); border-bottom: 1px solid var(--border); }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 0.12em; color: var(--text); text-decoration: none; }
    .logo span { color: var(--accent); }
    .nav-actions { display: flex; gap: 16px; align-items: center; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 500; padding: 9px 20px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    .btn-primary { background: var(--accent); border: none; color: #111; font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; padding: 10px 22px; border-radius: 6px; cursor: pointer; text-decoration: none; }
    
    main { flex: 1; padding: calc(var(--nav-h) + 60px) 48px 100px; max-width: 1400px; margin: 0 auto; width: 100%; }
    .page-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; letter-spacing: 0.04em; color: var(--text); margin-bottom: 40px; }
    
    /* TABLE */
    .table-container { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 16px 24px; border-bottom: 1px solid var(--border); }
    th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); font-weight: 600; background: rgba(0,0,0,0.1); }
    td { font-size: 15px; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(255,255,255,0.02); }
    
    .car-img { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; background: #000; }
    .action-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--accent); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; text-transform: uppercase; }
    .action-btn:hover { border-color: var(--accent); }
    
    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; padding: 40px; position: relative; }
    .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--accent); margin-bottom: 24px; letter-spacing: 0.05em; }
    .close-modal { position: absolute; top: 24px; right: 24px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 24px; }
    .close-modal:hover { color: var(--text); }
    
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-group label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .form-group input { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: 6px; font-family: 'Barlow', sans-serif; outline: none; }
    .form-group input:focus { border-color: var(--accent); }
    
    .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin: 32px 0 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    
    #error, #loading { text-align: center; padding: 40px; }
    #error { color: #ff5555; display: none; }
  </style>
  
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">CASH<span>4</span>CRASH <span>[FLEET]</span></a>
    <div class="nav-actions">
      <a href="admin.html" class="btn-ghost">Back to Dashboard</a>
    </div>
  </nav>

  <main>
    <h1 class="page-title">Fleet Manager</h1>
    <div id="loading">Loading Inventory Data...</div>
    <div id="error">You are not authorized to view this page.</div>
    
    <div id="content" style="display: none;">
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>ID</th>
              <th>Make & Name</th>
              <th>Model Year</th>
              <th>Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="fleet-table-body">
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <!-- EDIT MODAL -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <button class="close-modal" onclick="closeModal()">×</button>
      <h2>Edit Vehicle</h2>
      <form id="edit-form">
        <input type="hidden" id="edit-id" />
        
        <div class="form-grid">
          <div class="form-group">
            <label>Name (e.g. M4 Competition)</label>
            <input type="text" id="edit-name" required />
          </div>
          <div class="form-group">
            <label>Make (e.g. BMW)</label>
            <input type="text" id="edit-make" required />
          </div>
          <div class="form-group">
            <label>Brand Slug (e.g. bmw)</label>
            <input type="text" id="edit-brand" required />
          </div>
          <div class="form-group">
            <label>Model Year (e.g. 2024)</label>
            <input type="text" id="edit-year" required />
          </div>
          <div class="form-group">
            <label>Price ($)</label>
            <input type="number" step="0.01" id="edit-price" required />
          </div>
          <div class="form-group">
            <label>Image URL</label>
            <input type="text" id="edit-image" required />
          </div>
        </div>
        
        <h3 class="section-title">Specifications</h3>
        <div class="form-grid">
          <div class="form-group">
            <label>Gearbox</label>
            <input type="text" id="spec-gearbox" />
          </div>
          <div class="form-group">
            <label>Fuel Type</label>
            <input type="text" id="spec-fuel" />
          </div>
          <div class="form-group">
            <label>Doors</label>
            <input type="number" id="spec-doors" />
          </div>
          <div class="form-group">
            <label>Seats</label>
            <input type="number" id="spec-seats" />
          </div>
          <div class="form-group">
            <label>Efficiency (MPG)</label>
            <input type="number" id="spec-mpg" />
          </div>
        </div>
        
        <div style="text-align: right; margin-top: 32px;">
          <button type="button" class="btn-ghost" onclick="closeModal()" style="margin-right: 12px;">Cancel</button>
          <button type="submit" class="btn-primary" id="save-btn">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = '/api';
    let globalCars = [];
    let authToken = '';

    document.addEventListener('DOMContentLoaded', () => {
      auth.onAuthStateChanged(async user => {
        if (!user) {
          window.location.href = 'login.html';
        } else {
          try {
            const token = await user.getIdToken();
            
            // Verify admin by checking profile
            const profRes = await fetch(`${API_BASE}/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!profRes.ok) throw new Error("Auth failed");
            const profile = await profRes.json();
            
            if (!profile.is_admin) {
              document.getElementById('loading').style.display = 'none';
              document.getElementById('error').style.display = 'block';
              return;
            }
            
            authToken = token;
            fetchCars();
          } catch (e) {
            console.error(e);
            window.location.href = 'login.html';
          }
        }
      });
    });

    async function fetchCars() {
      try {
        const res = await fetch(`${API_BASE}/cars`);
        if (res.ok) {
          globalCars = await res.json();
          renderTable();
          document.getElementById('loading').style.display = 'none';
          document.getElementById('content').style.display = 'block';
        } else {
          throw new Error("Failed to load cars");
        }
      } catch (err) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').innerText = "Error loading fleet inventory.";
        document.getElementById('error').style.display = 'block';
      }
    }

    function renderTable() {
      const tbody = document.getElementById('fleet-table-body');
      tbody.innerHTML = globalCars.map(c => `
        <tr>
          <td><img src="${c.image}" class="car-img" alt="${c.name}" /></td>
          <td style="color: var(--muted);">${c.id}</td>
          <td><strong>${c.make}</strong> ${c.name}</td>
          <td>${c.model_year}</td>
          <td style="color: var(--accent); font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.05em;">$${c.price.toLocaleString()}</td>
          <td>
            <button class="action-btn" onclick="openModal('${c.id}')">Edit</button>
          </td>
        </tr>
      `).join('');
    }

    function openModal(carId) {
      const car = globalCars.find(c => c.id === carId);
      if(!car) return;
      
      document.getElementById('edit-id').value = car.id;
      document.getElementById('edit-name').value = car.name || '';
      document.getElementById('edit-make').value = car.make || '';
      document.getElementById('edit-brand').value = car.brand || '';
      document.getElementById('edit-year').value = car.model_year || '';
      document.getElementById('edit-price').value = car.price || 0;
      document.getElementById('edit-image').value = car.image || '';
      
      const specs = car.specs || {};
      document.getElementById('spec-gearbox').value = specs.gearbox || '';
      document.getElementById('spec-fuel').value = specs.fuel || '';
      document.getElementById('spec-doors').value = specs.doors || '';
      document.getElementById('spec-seats').value = specs.seats || '';
      document.getElementById('spec-mpg').value = specs.mpg || '';
      
      document.getElementById('edit-modal').classList.add('open');
    }

    function closeModal() {
      document.getElementById('edit-modal').classList.remove('open');
    }

    document.getElementById('edit-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('edit-id').value;
      const saveBtn = document.getElementById('save-btn');
      
      const payload = {
        name: document.getElementById('edit-name').value,
        make: document.getElementById('edit-make').value,
        brand: document.getElementById('edit-brand').value,
        model_year: document.getElementById('edit-year').value,
        price: parseFloat(document.getElementById('edit-price').value),
        image: document.getElementById('edit-image').value,
        specs: {
          gearbox: document.getElementById('spec-gearbox').value,
          fuel: document.getElementById('spec-fuel').value,
          doors: parseInt(document.getElementById('spec-doors').value) || 0,
          seats: parseInt(document.getElementById('spec-seats').value) || 0,
          mpg: parseInt(document.getElementById('spec-mpg').value) || 0,
        }
      };

      saveBtn.disabled = true;
      saveBtn.innerText = 'Saving...';
      
      try {
        const res = await fetch(`${API_BASE}/admin/cars/${id}`, {
          method: 'PUT',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify(payload)
        });
        
        if (res.ok) {
          closeModal();
          await fetchCars(); // reload table
        } else {
          alert('Failed to update vehicle');
        }
      } catch(err) {
        alert('An error occurred');
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = 'Save Changes';
      }
    });
  </script>
</body>
</html>
