version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: cash4crash_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    #ports:
    #  - "5432:5432"

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:admin@db:5432/cash4crash_db}
      ANALYTICS_DATABASE_URL: ${ANALYTICS_DATABASE_URL:-postgresql://postgres:admin@db:5432/cash4crash_analytics}
    depends_on:
      - db

  frontend:
    build:
      context: .
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
